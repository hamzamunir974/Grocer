version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: grocerx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grocerx
      POSTGRES_PASSWORD: grocerx_secret
      POSTGRES_DB: grocerx_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grocerx']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grocerx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grocerx.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
